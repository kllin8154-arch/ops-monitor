global:
  resolve_timeout: 5m

route:
  receiver: 'ops-webhook'
  group_by: ['alertname', 'server_name']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'ops-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:8080/api/alerts/webhook'
        send_resolved: true
