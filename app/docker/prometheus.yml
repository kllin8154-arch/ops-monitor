global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
- /etc/prometheus/alert.rules.yml
alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - ops-alertmanager:9093
scrape_configs:
- job_name: prometheus
  static_configs:
  - targets:
    - localhost:9090
- job_name: node-exporter
  file_sd_configs:
  - files:
    - /etc/prometheus/targets/node.json
    refresh_interval: 30s
  static_configs:
  - targets:
    - ops-node-exporter:9100
    labels:
      server_name: 本机
      server_id: local
      managed_by: ops-monitor
      exporter_type: node
- job_name: local-process-9256
  static_configs:
  - targets:
    - ops-process-exporter-9256:9256
    labels:
      exporter_type: process
      managed_by: ops-monitor
      server_id: local
      server_name: 本机
remote_write:
- url: http://ops-victoria:8428/api/v1/write
